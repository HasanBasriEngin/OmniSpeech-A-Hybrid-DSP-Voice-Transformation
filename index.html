<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OmniSpeech</title>
    <style>
      html,
      body,
      #root {
        margin: 0;
        min-height: 100%;
        background: #080b14;
      }

      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 10% 12%, rgba(20, 184, 166, 0.25), transparent 34%),
          radial-gradient(circle at 85% 8%, rgba(56, 189, 248, 0.2), transparent 28%),
          radial-gradient(circle at 80% 88%, rgba(244, 114, 182, 0.14), transparent 30%),
          #080b14;
        color: #eef6ff;
        font-family: "Segoe UI", sans-serif;
        transition: opacity 420ms ease, visibility 420ms ease;
      }

      #boot-splash.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      #boot-splash .halo {
        position: absolute;
        width: min(42vw, 420px);
        aspect-ratio: 1;
        border-radius: 999px;
        background: conic-gradient(
          from 0deg,
          rgba(45, 212, 191, 0.45),
          rgba(56, 189, 248, 0.35),
          rgba(244, 114, 182, 0.3),
          rgba(45, 212, 191, 0.45)
        );
        filter: blur(40px);
        animation: halo-spin 6s linear infinite;
      }

      #boot-splash .card {
        position: relative;
        width: min(540px, 90vw);
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(8, 14, 25, 0.7);
        backdrop-filter: blur(14px);
        box-shadow: 0 24px 54px rgba(5, 10, 25, 0.55);
        padding: 28px 26px;
      }

      #boot-splash .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
      }

      #boot-splash .brand-mark {
        width: 12px;
        height: 12px;
        border-radius: 999px;
        background: linear-gradient(135deg, #0ea5a6, #38bdf8);
        box-shadow: 0 0 14px rgba(20, 184, 166, 0.7);
      }

      #boot-splash .title {
        margin: 0;
        font-size: clamp(24px, 3.8vw, 34px);
        font-weight: 700;
        letter-spacing: 0.01em;
      }

      #boot-splash .subtitle {
        margin: 0;
        color: rgba(224, 236, 255, 0.82);
        font-size: 14px;
      }

      #boot-splash .bars {
        margin-top: 18px;
        display: grid;
        grid-template-columns: repeat(24, minmax(0, 1fr));
        gap: 4px;
        align-items: end;
        height: 44px;
      }

      #boot-splash .bars span {
        display: block;
        border-radius: 8px;
        background: linear-gradient(180deg, #67e8f9, #0ea5a6);
        transform-origin: bottom;
        animation: bar-wave 1.1s ease-in-out infinite;
      }

      #boot-splash .bars span:nth-child(odd) {
        background: linear-gradient(180deg, #7dd3fc, #0284c7);
      }

      #boot-splash .bars span:nth-child(3n) {
        background: linear-gradient(180deg, #f9a8d4, #ec4899);
      }

      #boot-splash .hint {
        margin-top: 14px;
        color: rgba(201, 216, 237, 0.72);
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      #boot-splash .bars span:nth-child(1) { animation-delay: 0ms; }
      #boot-splash .bars span:nth-child(2) { animation-delay: 60ms; }
      #boot-splash .bars span:nth-child(3) { animation-delay: 120ms; }
      #boot-splash .bars span:nth-child(4) { animation-delay: 180ms; }
      #boot-splash .bars span:nth-child(5) { animation-delay: 240ms; }
      #boot-splash .bars span:nth-child(6) { animation-delay: 300ms; }
      #boot-splash .bars span:nth-child(7) { animation-delay: 360ms; }
      #boot-splash .bars span:nth-child(8) { animation-delay: 420ms; }
      #boot-splash .bars span:nth-child(9) { animation-delay: 480ms; }
      #boot-splash .bars span:nth-child(10) { animation-delay: 540ms; }
      #boot-splash .bars span:nth-child(11) { animation-delay: 600ms; }
      #boot-splash .bars span:nth-child(12) { animation-delay: 660ms; }
      #boot-splash .bars span:nth-child(13) { animation-delay: 720ms; }
      #boot-splash .bars span:nth-child(14) { animation-delay: 780ms; }
      #boot-splash .bars span:nth-child(15) { animation-delay: 840ms; }
      #boot-splash .bars span:nth-child(16) { animation-delay: 900ms; }
      #boot-splash .bars span:nth-child(17) { animation-delay: 960ms; }
      #boot-splash .bars span:nth-child(18) { animation-delay: 1020ms; }
      #boot-splash .bars span:nth-child(19) { animation-delay: 1080ms; }
      #boot-splash .bars span:nth-child(20) { animation-delay: 1140ms; }
      #boot-splash .bars span:nth-child(21) { animation-delay: 1200ms; }
      #boot-splash .bars span:nth-child(22) { animation-delay: 1260ms; }
      #boot-splash .bars span:nth-child(23) { animation-delay: 1320ms; }
      #boot-splash .bars span:nth-child(24) { animation-delay: 1380ms; }

      @keyframes bar-wave {
        0%, 100% { transform: scaleY(0.2); opacity: 0.6; }
        50% { transform: scaleY(1); opacity: 1; }
      }

      @keyframes halo-spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="boot-splash">
      <div class="halo" aria-hidden="true"></div>
      <div class="card">
        <div class="brand">
          <div class="brand-mark"></div>
          <h1 class="title">OmniSpeech</h1>
        </div>
        <p class="subtitle">Hybrid DSP Voice Transformation Studio</p>
        <div class="bars" aria-hidden="true">
          <span></span><span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span><span></span>
        </div>
        <div class="hint">Booting voice engine</div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
